<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000" viewBox="0 0 1400 1000" role="img" aria-label="Сертификат: Самому лучшему отцу — Варянице Михаилу Олеговичу">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#121A2F"/>
    </linearGradient>
    <radialGradient id="glowCyan" cx="25%" cy="15%" r="60%">
      <stop offset="0" stop-color="#00D1FF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00D1FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGold" cx="85%" cy="10%" r="65%">
      <stop offset="0" stop-color="#FFB000" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFB000" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M52 0H0V52" fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00D1FF" stop-opacity="0.7"/>
      <stop offset="0.5" stop-color="#FFB000" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#00D1FF" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1000" fill="url(#bg)"/>
  <rect width="1400" height="1000" fill="url(#grid)" opacity="0.65"/>
  <rect width="1400" height="1000" fill="url(#glowCyan)"/>
  <rect width="1400" height="1000" fill="url(#glowGold)"/>

  <!-- Frame -->
  <g filter="url(#softShadow)">
    <rect x="70" y="70" width="1260" height="860" rx="34" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="2"/>
    <rect x="92" y="92" width="1216" height="816" rx="28" fill="transparent" stroke="url(#border)" stroke-width="2.5" opacity="0.9"/>
    <rect x="114" y="114" width="1172" height="772" rx="24" fill="transparent" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="2"/>
  </g>

  <!-- Header -->
  <g>
    <text x="700" y="235" text-anchor="middle"
      font-family="Manrope, Segoe UI, Arial, sans-serif" font-size="34" letter-spacing="8"
      fill="#FFFFFF" fill-opacity="0.70">
      &#1057;&#1045;&#1056;&#1058;&#1048;&#1060;&#1048;&#1050;&#1040;&#1058;
    </text>
    <line x1="360" y1="265" x2="1040" y2="265" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="2"/>
  </g>

  <!-- Main title -->
  <g>
    <text x="700" y="370" text-anchor="middle"
      font-family="Manrope, Segoe UI, Arial, sans-serif" font-size="60" font-weight="800"
      fill="#FFFFFF" fill-opacity="0.93">
      &#1057;&#1072;&#1084;&#1086;&#1084;&#1091; &#1083;&#1091;&#1095;&#1096;&#1077;&#1084;&#1091; &#1086;&#1090;&#1094;&#1091;
    </text>
    <text x="700" y="458" text-anchor="middle"
      font-family="Manrope, Segoe UI, Arial, sans-serif" font-size="22"
      fill="#FFFFFF" fill-opacity="0.70">
      &#1079;&#1072; &#1085;&#1072;&#1076;&#1105;&#1078;&#1085;&#1086;&#1089;&#1090;&#1100;&#44; &#1089;&#1080;&#1083;&#1091;&#44; &#1079;&#1072;&#1073;&#1086;&#1090;&#1091; &#1080; &#1079;&#1086;&#1083;&#1086;&#1090;&#1099;&#1077; &#1088;&#1091;&#1082;&#1080;
    </text>
  </g>

  <!-- Name -->
  <g>
    <line x1="430" y1="560" x2="970" y2="560" stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="2"/>
    <text x="700" y="548" text-anchor="middle"
      font-family="Segoe Script, Comic Sans MS, 'Brush Script MT', cursive" font-size="64"
      fill="#FFB000">
      &#1042;&#1072;&#1088;&#1103;&#1085;&#1080;&#1094;&#1077; &#1052;&#1080;&#1093;&#1072;&#1080;&#1083;&#1091; &#1054;&#1083;&#1077;&#1075;&#1086;&#1074;&#1080;&#1095;&#1091;
    </text>
  </g>

  <!-- Footer small text -->
  <g>
    <text x="170" y="820" text-anchor="start"
      font-family="Manrope, Segoe UI, Arial, sans-serif" font-size="18"
      fill="#FFFFFF" fill-opacity="0.62">
      &#1042;&#1088;&#1091;&#1095;&#1072;&#1077;&#1090;&#1089;&#1103; &#1089; &#1083;&#1102;&#1073;&#1086;&#1074;&#1100;&#1102; &#1086;&#1090; &#1042;&#1072;&#1083;&#1077;&#1088;&#1099;&#44; &#1051;&#1077;&#1088;&#1099; &#1080; &#1050;&#1088;&#1080;&#1089;&#1090;&#1080;&#1085;&#1099;
    </text>
    <text x="170" y="852" text-anchor="start"
      font-family="Manrope, Segoe UI, Arial, sans-serif" font-size="14"
      fill="#FFFFFF" fill-opacity="0.48">
      24 &#1072;&#1087;&#1088;&#1077;&#1083;&#1103; 2026 &#1075;.
    </text>
  </g>

  <!-- Seal -->
  <g transform="translate(1050 740)">
    <circle cx="140" cy="95" r="78" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="2"/>
    <circle cx="140" cy="95" r="62" fill="transparent" stroke="url(#border)" stroke-width="2.5" opacity="0.9"/>
    <g transform="translate(140 95)">
      <path d="M0,-34 L9,-11 L34,-11 L13,3 L21,27 L0,12 L-21,27 L-13,3 L-34,-11 L-9,-11 Z"
        fill="#00D1FF" opacity="0.92"/>
    </g>
    <text x="140" y="165" text-anchor="middle"
      font-family="Manrope, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700"
      fill="#FFFFFF" fill-opacity="0.78">
      &#8470; 001
    </text>
  </g>
</svg>
